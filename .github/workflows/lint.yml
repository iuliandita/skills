name: Lint Skills

on:
  push:
    branches: [main]
    paths:
      - 'skills/**'
      - 'scripts/**'
  pull_request:
    paths:
      - 'skills/**'
      - 'scripts/**'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint skill collection
        run: ./scripts/lint-skills.sh

      - name: Validate Agent Skills spec compliance
        run: ./scripts/validate-spec.sh

      - name: Check installer syntax
        run: bash -n install.sh

      - name: Shellcheck scripts
        run: |
          if command -v shellcheck >/dev/null 2>&1; then
            shellcheck scripts/lint-skills.sh scripts/validate-spec.sh install.sh
          else
            echo "shellcheck not available, skipping"
          fi
